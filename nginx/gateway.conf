# --- САЙТ ПИЦЦЫ ---
server {
    listen 80;
    server_name xn--e1afmkfd.website;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2; # Включен HTTP/2 для параллельной загрузки
    server_name xn--e1afmkfd.website;

    # Сжатие Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_comp_level 5;

    ssl_certificate /etc/letsencrypt/live/xn--e1afmkfd.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--e1afmkfd.website/privkey.pem;

    # Оптимизация SSL
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location ~ ^/(api|cpanel|demo-admin|djstatic|media)/ {
        proxy_pass http://pizza-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://pizza-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- САЙТ ПОРТФОЛИО ---
server {
    listen 80;
    server_name apolkanov.pro www.apolkanov.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2; # Включен HTTP/2
    server_name apolkanov.pro www.apolkanov.pro;

    client_max_body_size 10M;

    # Сжатие Gzip (решает проблему "Запросы, блокирующие отрисовку")
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    ssl_certificate /etc/letsencrypt/live/apolkanov.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apolkanov.pro/privkey.pem;

    # Безопасность и кэширование SSL
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 1. Системные файлы (SEO и иконки)
    location ~ ^/(robots\.txt|sitemap\.xml|favicon\.ico) {
        proxy_pass http://portfolio-nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Основной прокси для всего сайта
    location / {
        proxy_pass http://portfolio-nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Улучшение работы прокси
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
    }
}